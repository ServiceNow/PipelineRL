defaults:
    - base
finetune:
    seq_length: 4000
    gradient_accumulation_passes: 1024
fast_llm:
    training:
        num_workers: 1
    schedule:
        depth_first_micro_batches: 256
    model:
        base_model:
            head:
                losses:
                    grpo:
                        epsilon_low: 0.1
                        epsilon_high: 0.1
    optimizer:
        learning_rate:
            base: 1e-5
llm:
    parameters:
        max_tokens: 1000
test_llm:
    parameters:
        max_tokens: 1000
actor:
    rollout_policy: pipelinerl.domains.counting.generate_counting_rollout
environment: null
dataset_loader: pipelinerl.domains.counting.load_problems
train_dataset_names:
    - train_counting_problems
test_dataset_names:
    - test_counting_problems
