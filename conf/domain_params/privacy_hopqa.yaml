annotations_path: ${oc.env:PRIVACY_AGENT_ANNOTATIONS_PATH,.privacy_agent/inputs/annotations_2026-04-06.json}
curated_path: ${oc.env:PRIVACY_AGENT_CURATED_PATH,.privacy_agent/inputs/curated_chains.jsonl}
final_dataset_path: ${oc.env:PRIVACY_HOPQA_FINAL_DATASET_PATH,/home/toolkit/my_code/MosaicProject/data_files/privacy_hopqa_final_dataset/privacy_hopqa_finalized_2026-05-13_q30_final_residual_review.jsonl}
final_train_dataset_path: ${oc.env:PRIVACY_HOPQA_TRAIN_DATASET_PATH,/home/toolkit/my_code/MosaicProject/data_files/privacy_hopqa_final_dataset/privacy_hopqa_finalized_2026-05-13_q30_final_residual_review_train.jsonl}
final_val_dataset_path: ${oc.env:PRIVACY_HOPQA_VAL_DATASET_PATH,/home/toolkit/my_code/MosaicProject/data_files/privacy_hopqa_final_dataset/privacy_hopqa_finalized_2026-05-13_q30_final_residual_review_val.jsonl}
final_test_dataset_path: ${oc.env:PRIVACY_HOPQA_TEST_DATASET_PATH,/home/toolkit/my_code/MosaicProject/data_files/privacy_hopqa_final_dataset/privacy_hopqa_finalized_2026-05-13_q30_final_residual_review_test.jsonl}
sample_size: 20
max_examples: null
task_data_root: ${oc.env:PRIVACY_AGENT_TASK_DATA_ROOT,.privacy_agent/inputs/tasks}
# Previous local-index default, kept for debugging old runs:
# /mnt/llmd/results/exps/alexg/privacy_agent/local_indices_fixeddeps_20260415
local_index_root: ${oc.env:PRIVACY_AGENT_LOCAL_INDEX_ROOT,/mnt/llmd/results/exps/alexg/privacy_hopqa_shared/q30_final_residual_review_20260513/local_indices_fixeddeps_20260415}
local_index_mmap_mode: r
helper_service_url: ${oc.env:PRIVACY_AGENT_HELPER_URL, null}
helper_timeout_s: 30.0
generation_context_limit_tokens: 16384
generation_context_margin_tokens: 128
hop_plan_max_tokens: 4096
doc_choose_max_tokens: 4096
doc_read_max_tokens: 4096
hop_resolve_max_tokens: 4096
use_remote_local_search: true
use_remote_browsecomp: true
capture_mode: all_calls
answer_match_f1_threshold: 0.75
answer_match_mode: exact_or_f1
reward_mode: all_hops_correct
# Training texts use the rollout outcome by default. Experimental stepwise modes:
# training_reward_mode=prefix_progress gives each captured call
# prefix_correct_hops_so_far / total_hops. training_reward_mode=hop_step gives
# hop-local shaped reward: hop correctness plus a 0.25 source-type bonus for
# hop_plan, divided by the number of iterations spent on that hop.
# stop_after_incorrect_hop=true ends the rollout after the first resolved wrong
# hop without injecting gold.
# Use together with finetune.rl.step_reward_advantages=true and
# finetune.rl.pad_step_rewards_for_advantage=true.
training_reward_mode: outcome
hop_step_source_bonus: 0.25
stop_after_incorrect_hop: false
zero_error_step_reward: true
max_iterations: 14
iteration_budget_per_hop: 2
# Keep retries/fallback explicit: hidden generic local+web fallback changes
# the source-selection policy and can mask whether the model learned the tool.
hop_plan_attempts: 1
enable_generic_retrieval_fallback: false
enable_local_search_bootstrap: false
max_parallel_retrieval_actions: 3
retrieval_top_k: 5
# Select parent documents, not individual chunks. Each selected parent with
# <= read_all_windows_max_count evidence windows is expanded into all windows.
choose_top_k: 3
# Interpreted as max parent documents. In windowed mode, all evidence windows
# from those parent documents remain available to choose/read.
max_candidate_cards: 20
chooser_excerpt_chars: 500
reader_excerpt_chars: 2500
# New default: retrieve parent docs, then expose larger selectable evidence
# windows to the chooser/reader. Revert to the original prefix-only behavior
# with: privacy_hopqa.retrieval_context_mode=legacy_prefix
retrieval_context_mode: windowed_evidence
retrieval_source_chars: 0
retrieval_chunk_chars: 4000
retrieval_chunk_overlap_chars: 800
reader_window_chars: 16000
reader_window_overlap_chars: 1000
max_windows_per_parent: 0
# Parent documents with <= read_all_windows_max_count evidence windows are read
# in full. Longer parent docs should be removed by the helper live filter and
# blacklist; if one slips through, read only query-relevant batches rather than
# exploding the rollout.
large_parent_window_policy: top_with_neighbors
read_all_windows_max_count: 5
large_parent_top_windows: 4
large_parent_neighbor_windows: 1
large_parent_max_read_windows: 0
max_history_entries: 10
local_search_threshold: 0.0
semantic_threshold: 0.7
browsecomp_enabled: true
browsecomp_device: cpu
# Previous local BrowseComp default, kept for debugging old runs:
# .privacy_agent/browsecomp/indexes/qwen3-embedding-4b/corpus.shard*_of_*.pkl
browsecomp_index_glob: ${oc.env:PRIVACY_AGENT_BROWSECOMP_INDEX_GLOB,/mnt/llmd/results/exps/alexg/privacy_hopqa_shared/q30_final_residual_review_20260513/browsecomp_indexes/qwen3-embedding-4b/corpus.shard*_of_*.pkl}
browsecomp_model_name: Qwen/Qwen3-Embedding-4B
browsecomp_corpus: Tevatron/browsecomp-plus-corpus
browsecomp_top_k: 5
browsecomp_max_chars: 8000
llm_provider: vllm
embedding_provider: huggingface
embedding_model: Qwen/Qwen3-Embedding-4B
log_prompts: false
verbose: false
no_web: false
parallel_searches: true
max_parallel_doc_reads: 5
