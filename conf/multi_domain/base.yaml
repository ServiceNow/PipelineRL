# @package _global_
defaults:
  - /domain_rollouts@domain_rollouts: base
  - domain_mix: null

actor:
  rollout_policy: pipelinerl.domains.dispatcher.generate_multidomain_rollout
  system_prompt: ""
  task_template: |-
    {task}
  task_prompt: ""
  ensure_boxed_answers: false
  domain_mix: null
  # Domain-specific system prompts (used when actor.system_prompt is empty)
  domain_system_prompts:
    coding: |-
      You are an expert Python programmer. When providing code solutions, format your final code inside markdown code blocks using triple backticks with the python language identifier, like this:
      ```python
      # your code here
      ```
      Provide complete, working implementations that pass all test cases.
    fn_calling: |-
      You are a helpful assistant with access to functions. When the user's request requires using a function, call the appropriate function with the correct arguments. Make function calls in JSON format.
    math: ""
    logic: |-
      You are an expert at solving logic puzzles and reasoning problems. Think through each problem step by step, then provide your final answer inside <answer></answer> tags.
  domain_rollouts:
    math: ${domain_rollouts.math}
    guessing: ${domain_rollouts.guessing}
    counting: ${domain_rollouts.counting}
    chartqa: ${domain_rollouts.chartqa}
    miniwob: ${domain_rollouts.miniwob}
    coding: ${domain_rollouts.coding}
    fn_calling: ${domain_rollouts.fn_calling}
    logic: ${domain_rollouts.logic}

  # Use local mcp-run-python sandbox (no separate K8s job needed)
  use_local_sandbox: true
  sandbox_timeout: 5.0
  max_tests_per_problem: 15
  # Use local BFCL verifier for fn_calling (no separate K8s job needed)
  use_local_bfcl_verifier: true

dataset_loader: pipelinerl.domains.multidomain.loader.load_datasets
dataset_loader_params:
  per_domain_params:
    coding:
      # PrimeIntellect INTELLECT-3-RL code domain (8.5k curated samples)
      dataset_id: PrimeIntellect/INTELLECT-3-RL
      dataset_config: code
      split: train
      subset: train
      train_ratio: 0.9
      min_difficulty: 0.1
      max_difficulty: 0.9
      difficulty_column: avg@8_qwen3_4b_instruct_2507
      max_examples: null
      seed: 42
      huggingface_token: ${oc.env:HF_TOKEN, null}
    logic:
      # PrimeIntellect INTELLECT-3-RL logic domain (11.6k samples, 87 task types)
      dataset_id: PrimeIntellect/INTELLECT-3-RL
      dataset_config: logic
      split: train
      subset: train
      train_ratio: 0.9
      min_difficulty: 0.0
      max_difficulty: 1.0
      difficulty_column: avg@16_qwen3_4b_instruct_2507
      tasks_to_skip: [arc_agi, arc_agi_2, buggy_tables]
      max_examples: null
      seed: 42
      huggingface_token: ${oc.env:HF_TOKEN, null}
    fn_calling:
      # BFCL v3 function calling (Berkeley Function Calling Leaderboard)
      categories:
        - simple
        - multiple
        - parallel
        - parallel_multiple
      max_examples_per_category: null
      max_examples: null
      subset: train  # "train" or "test" (90/10 split)
      train_ratio: 0.9
      seed: 42

train_dataset_names: []
test_dataset_names: []

environments:
  - key: math
    mode: remote
    replicas_per_actor: ${world.env_replicas_per_actor}
    _target_: pipelinerl.domains.math.MathEnvironment
  # Coding uses local sandbox, no remote environment needed
  # Logic uses local i3-logic verifier by default, but can use remote:
  # - key: logic
  #   mode: remote
  #   replicas_per_actor: ${world.env_replicas_per_actor}
  #   _target_: pipelinerl.domains.logic.LogicEnvironment
  #   max_workers: 4
  # fn_calling uses local BFCL verifier by default, but can use remote:
  # - key: fn_calling
  #   mode: remote
  #   replicas_per_actor: ${world.env_replicas_per_actor}
  #   _target_: pipelinerl.domains.fn_calling.BFCLEnvironment
  #   max_workers: 4

environment_key: null

world:
  env_replicas_per_actor: 1
