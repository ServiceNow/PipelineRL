# Hint-conditioned RL on MiniWoB — arm T_A2_MI: hint mix {good, none, distractor}, MULTI-INSTANCE + RE-MINE.
#
# TODO-0 upgrade bundle (multiinstance). Identical to cube_miniwob_hint_ta2 (the v3 3B
# {good, none, distractor} arm) PLUS:
#   - actor.vary_instance_seed: true — the MiniWoB instance is no longer pinned to seed 42;
#     one stable instance seed is drawn per GRPO group (all `attempts` share it, groups differ),
#     so the policy trains across the task's randomised instances.
#   - cube_params.hint_refresh — periodic in-training hint RE-MINING with the INSTANCE-GENERAL
#     miner (general_prompt + reject_literals): the miner prompt forbids instance-specific
#     content and any mined hint that still leaks a literal/id/answer is dropped, keeping hints
#     generalizable across the now-randomised instances. distractor is rebuilt as a seeded
#     shuffle of the re-mined good map (same rule as scripts/build_hint_bank.py). Cold start:
#     the static bank seeds task_hints until the first refresh lands (hint map version 0 keeps
#     the baked-in bank hints). GRPO purity: each cube declares its hint_condition; the
#     scheduler pins one hint-map version per group, so a group's 8 attempts share one map.
# The distractor cube (a real hint for the WRONG task) teaches "a hint is optional evidence" —
# the regression-killer. Matched compute to the v3 arms (ga256, warmup20, max_steps500,
# attempts8, 3B model_path).
#
# REQUIREMENTS (cluster):
#   - cube-harness checked out at branch `oo/jefhinter-workarena` (miniwob port=0 free-port
#     fix; each Ray worker self-hosts its own MiniWob http server) + `pip install -e
#     cube-harness/cubes/miniwob` into the PipelineRL venv + `playwright install chromium`.
#   - Browsers run on CPU in the Ray workers (cube_workers below is sized for that).
#
# Launch:
#   python -m pipelinerl.launch --config-name=cube_miniwob_hint_ta2_mi output_dir=results/hint_rl/ta2_mi
#
# Sibling arms: cube_miniwob_hint_b1_mi (no hints), cube_miniwob_hint_ta1_mi ({good, none}),
# cube_miniwob_hint_ta2_mi ({good, none, distractor}). All multi-instance + matched compute.
defaults:
  - base
  - override rewards: success_and_format   # inert for cube_rl (reward comes from task.evaluate())
  - _self_

output_dir: results/cube_miniwob_hint_ta2_mi/${now:%Y-%m-%d}/${now:%H-%M-%S}
model_path: /mnt/checkpoints/pretrained_models/Qwen2.5-3B-Instruct
litellm_logging_level: info
ray_debug: 0
ray_local_mode: false

# Held-out on-the-fly eval: T_eval tasks, NO hints (lift itself is measured post-hoc by the
# frozen JefHinter harness). version = cumulative samples (~256/optimizer-step here, observed
# model_version≈81k at TA2 step 300); so 16384 ≈ every ~60 steps → ~8 evals over a 485-step run.
eval_every_n_versions: 16384

wandb:
  wandb_project_name: jeffhinter
  wandb_group: hint-rl-3b
  tags: [training, ta2, multiinstance]

actor:
  launcher: ray
  ray_num_cpus: null
  cube_workers_num_cpus: 1.0
  cube_eval_workers_fraction: 0.25
  cube_workers: 40          # each rollout runs a headless Chromium — far heavier than math
  llm_max_rollouts: 40
  ray_worker_log_enabled: true
  ray_worker_log_path: null
  ray_worker_log_level: WARNING
  ray_worker_litellm_log_level: CRITICAL
  # MULTI-INSTANCE: per-GRPO-group MiniWoB instance seed (off in the v3 arms; here on).
  vary_instance_seed: true

llm:
  parameters:
    max_tokens: 2048
    max_completion_tokens: 2048   # per-turn budget; web-agent turns are short
    temperature: 1.0

test_llm:
  parameters:
    max_tokens: 2048
    max_completion_tokens: 2048
    temperature: 0.7              # matches the frozen eval-harness protocol
    top_p: 0.95

vllm_config:
  vllm_kwargs:
    max_model_len: 32000
    served_model_name: Qwen2.5-3B-Instruct
    enable-auto-tool-choice: ""
    tool-call-parser: rl_tool
    tool-parser-plugin: ${hydra:runtime.cwd}/pipelinerl/rl_tool_parser_plugin.py

finetune:
  seq_length: 32000
  seq_parallel: 4   # single-node 8-GPU world: 4 finetune GPUs (math config runs multi-node with 8)
  gradient_accumulation_passes: 256   # v3: ~4x more updates (rollout-bound)
  attempts: 8
  num_warmup_steps: 20            # v3: short warmup (was 50; whole 6h run was warmup)
  max_train_steps: 500            # v3: calibrated to ~12h budget
  rl:
    policy_loss: gspo
    overlong_filtering: true

preprocess:
  input: actor
  output: training_data
  n_workers: 8
  shared_memory_entry_size: 1000000000

cube_params:
  resource_guard:
    actor_memory_gb: 3.0          # Chromium per concurrent rollout
    memory_overhead_gb: 8.0
    memory_usage_threshold: 0.90
  seed: ${seed}
  # Periodic in-training hint re-mining (instance-general). version = cumulative samples
  # (~256/optimizer-step here); every_n_versions: 8192 -> ~every 30 steps -> ~16 re-mines
  # over a 485-step run. min_episodes gates mining per task (enough fresh evidence);
  # max_buffer_per_task caps the rolling transcript buffer. general_prompt + reject_literals
  # keep the re-mined hints instance-general (no leaked literals/ids/answers).
  hint_refresh:
    enabled: true
    every_n_versions: 8192
    min_episodes: 4
    max_buffer_per_task: 16
    general_prompt: true
    reject_literals: true
  cubes:
    # ---- condition: GOOD (the task's own mined hint, re-mined during training) --------
    - id: miniwob_train_good
      split: train
      hint_condition: good
      benchmark: &miniwob_train_benchmark
        _target_: pipelinerl.cube_rl.hint_bank.make_miniwob_benchmark
        split: train
        port: 0                   # auto free port per Ray worker
      agent: &genny_agent_base
        _target_: cube_harness.agents.genny.GennyConfig
        llm_config:
          _target_: cube_harness.llm.RoutedLLMConfig
          model_name: ${vllm_config.vllm_kwargs.served_model_name}
          tokenizer_name: ${model_path}
          max_model_len: ${vllm_config.vllm_kwargs.max_model_len}
          timeout: 600.0
          num_retries: 4
          extra_body:
            return_token_ids: true
        # Prompt scaffold IDENTICAL to the frozen JefHinter eval harness
        # (cube_harness.jefhinter.build_genny_agent) so trained policies stay
        # protocol-matched to the eval instrument.
        system_prompt: >-
          You are an expert web agent operating a real browser through an accessibility
          tree. Solve the user's task with the fewest, most deliberate actions. Read the
          observation carefully before acting; prefer precise element interactions over
          guessing. When a hint is provided, follow it.
        goal_template: |-
          {{task}}

          Suggested approach:
          1. Explore: inspect the environment — read relevant files, run diagnostic commands, or reproduce the issue before making changes.
          2. Act: execute the minimal steps needed to complete the task.
          3. Verify: confirm the result meets the requirement. If it does not, make a focused adjustment and try again.
        flat_history: false
        enable_summarize: true    # rolling summaries -> bounded context for web obs
        max_obs_chars: 40000
        max_format_errors: 3
        budget:
          _target_: cube_harness.agents.genny.BudgetConfig
          max_actions: 10
          cost_limit: 5.0
        # Cold-start seed only; replaced live once the first re-mining refresh lands.
        task_hints:
          _target_: pipelinerl.cube_rl.hint_bank.load_hint_map
          bank_path: ${hydra:runtime.cwd}/conf/hint_banks/miniwob_3b_v2.json
          condition: good
          split: train
    # ---- condition: NONE (no hint) ---------------------------------------------------
    - id: miniwob_train_none
      split: train
      hint_condition: none
      benchmark: *miniwob_train_benchmark
      agent:
        <<: *genny_agent_base
        task_hints: {}
    # ---- condition: DISTRACTOR (a real hint mined for a DIFFERENT task) ---------------
    - id: miniwob_train_distractor
      split: train
      hint_condition: distractor
      benchmark: *miniwob_train_benchmark
      agent:
        <<: *genny_agent_base
        task_hints:
          _target_: pipelinerl.cube_rl.hint_bank.load_hint_map
          bank_path: ${hydra:runtime.cwd}/conf/hint_banks/miniwob_3b_v2.json
          condition: distractor
          split: train
    # ---- held-out eval: T_eval tasks, no hints ----------------------------------------
    - id: miniwob_eval_nohint
      split: test
      benchmark:
        _target_: pipelinerl.cube_rl.hint_bank.make_miniwob_benchmark
        split: eval
        port: 0
      agent:
        <<: *genny_agent_base
        task_hints: {}
