defaults:
  - base
  - /domain_rollouts@domain_rollouts: base
  - domain_mix: math_coding_70_30
  - _self_

actor:
  rollout_policy: pipelinerl.domains.dispatcher.generate_multidomain_rollout
  system_prompt: ""
  task_template: |-
    {task}
  task_prompt: ""
  ensure_boxed_answers: false
  domain_rollouts:
    math: ${domain_rollouts.math}
    coding: ${domain_rollouts.coding}

  # SandboxFusion verification
  sandbox_endpoint: ${oc.env:SANDBOX_ENDPOINT,http://127.0.0.1:8080}
  sandbox_timeout: 5.0
  max_tests_per_problem: 15

dataset_loader: pipelinerl.domains.multidomain.loader.load_datasets
dataset_loader_params:
  per_domain_params:
    coding:
      # PrimeIntellect INTELLECT-3-RL code domain (8.5k curated samples)
      dataset_id: PrimeIntellect/INTELLECT-3-RL
      dataset_config: code
      split: train
      subset: train
      train_ratio: 0.9
      min_difficulty: 0.1
      max_difficulty: 0.9
      difficulty_column: avg@8_qwen3_4b_instruct_2507
      max_examples: null
      seed: 42
      huggingface_token: ${oc.env:HF_TOKEN, null}

train_dataset_names:
  - math::open_reasoner_zero_57k
  - math::open_reasoner_zero_extended_72k
  - coding::coding

test_dataset_names:
  - math::aime_2024
  - math::amc_2023
  - math::math_500
  - coding::coding

environments:
  - key: math
    mode: remote
    replicas_per_actor: ${world.env_replicas_per_actor}
    _target_: pipelinerl.domains.math.MathEnvironment
  # Coding uses SandboxFusion, no remote environment needed

environment_key: null

world:
  env_replicas_per_actor: 1
