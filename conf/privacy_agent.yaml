defaults:
  - base
  - /domain_params@privacy_agent: privacy_agent
  - _self_

actor:
  rollout_policy: pipelinerl.domains.privacy_agent.generate_privacy_agent_rollout
  system_prompt: ""
  task_template: |-
    {task}
  task_prompt: ""
  ensure_boxed_answers: false

dataset_loader: pipelinerl.domains.privacy_agent.dataset.load_problems
dataset_loader_params: ${privacy_agent}

train_dataset_names:
  - seed20

test_dataset_names:
  - seed20
