defaults:
    - base
    - _self_

use_fast_llm: true
weight_broadcast: true

fast_llm:
  data:
    micro_batch_size: 18000

actor:
  rollout_policy: pipelinerl.domains.math.generate_math_rollout
  system_prompt: Please reason step by step, and put your final answer within \boxed{}.
  task_template: "{task}"
  task_prompt: ""
environments:
  - key: math
    mode: remote
    _target_: pipelinerl.domains.math.MathEnvironment
environment_key: math
dataset_loader: pipelinerl.domains.math.load_datasets

finetune:
  seq_length: 20000

vllm_config:
  use_v1: true
  vllm_kwargs:
    max_model_len: 20000

llm:
  parameters: 
    max_tokens: 16000

test_llm:
  parameters: 
    max_tokens: 16000

train_dataset_names:
- open_reasoner_zero_57k
- open_reasoner_zero_extended_72k 
test_dataset_names:
  - aime_2024
  - amc_2023
  - math_500
