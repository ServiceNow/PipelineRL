# Cube RL on the math-tool-use env (TirAgent + Python sandbox + LaTeX answer).
# Mirrors cube_rl.yaml (arithmetic) but points at the ported math-tool-use cube and a
# SandboxFusion endpoint. See ~/dev/plans_rl/PLAN.md.
#
# PREREQUISITES:
#   1. A SandboxFusion server reachable from this box (separate job). Set its URL:
#        export SANDBOX_ENDPOINT=http://<sandbox-job-ip>:8080
#      (launch: docker run -p 8080:8080 volcengine/sandbox-fusion:server-20250609 on a
#       Docker-capable node; verify with pipelinerl/domains/coding/test_sandbox.py).
#   2. For a light plumbing run, cap tasks so install() doesn't write 130k cache files:
#        export MATH_TOOL_MAX_TASKS_PER_DATASET=200
#   3. Launch with the venv ACTIVATED (orchestrator spawns bare `python` subprocesses):
#        cd ~/dev/rl/PipelineRL && source .venv/bin/activate
#        python -m pipelinerl.launch --config-name=cube_math_rl output_dir=results/cube_math_rl/<name>
defaults:
  - base_4gpu
  - override rewards: success_and_format
  - _self_

output_dir: results/cube_math_rl/${now:%Y-%m-%d}/${now:%H-%M-%S}
model_path: /home/toolkit/models/Qwen2.5-1.5B-Instruct
litellm_logging_level: info
ray_debug: 0
ray_local_mode: false

actor:
  launcher: ray
  ray_num_cpus: null
  cube_workers_num_cpus: 1.0
  cube_eval_workers_fraction: 0.5
  cube_workers: 16
  llm_max_rollouts: 16
  ray_worker_log_enabled: true
  ray_worker_log_path: null
  ray_worker_log_level: WARNING
  ray_worker_litellm_log_level: CRITICAL

llm:
  parameters:
    max_tokens: 4096
    max_completion_tokens: 4096
    temperature: 1.0

test_llm:
  parameters:
    max_tokens: 4096
    max_completion_tokens: 4096
    temperature: 1.0
    top_p: 0.95

vllm_config:
  vllm_kwargs:
    max_model_len: 8192
    served_model_name: Qwen2.5-1.5B-Instruct
    enable-auto-tool-choice: ""
    tool-call-parser: rl_tool
    tool-parser-plugin: ${hydra:runtime.cwd}/pipelinerl/rl_tool_parser_plugin.py

finetune:
  seq_length: 8192
  gradient_accumulation_passes: 32
  rl:
    policy_loss: gspo
    overlong_filtering: true

preprocess:
  input: actor
  output: training_data
  n_workers: 4
  shared_memory_entry_size: 100000000

cube_params:
  resource_guard:
    actor_memory_gb: 1.25
    memory_overhead_gb: 8.0
    memory_usage_threshold: 0.90
  seed: ${seed}
  cubes:
    - id: open_reasoner_zero_57k
      split: train
      dataset_name: open_reasoner_zero_57k   # filters the registry to this dataset (via TaskMetadata.extra_info)
      benchmark:
        _target_: math_tool_use.benchmark.MathToolUseBenchmarkConfig
        # Per-task tool config (mainline: flows via TaskConfig.tool_config, not default_tool_config).
        tool_config:
          _target_: math_tool_use.tool.MathToolUseToolConfig
          sandbox_endpoint: ${oc.env:SANDBOX_ENDPOINT,http://127.0.0.1:8080}
      agent:
        _target_: cube_harness.agents.tir.TirAgentConfig
        llm_config:
          _target_: cube_harness.llm.RoutedLLMConfig
          model_name: ${vllm_config.vllm_kwargs.served_model_name}
          tokenizer_name: ${model_path}
          max_model_len: ${vllm_config.vllm_kwargs.max_model_len}
          timeout: 600.0
          num_retries: 1
          extra_body:
            return_token_ids: true
        system_prompt: |
          You are a math-focused AI Agent. Solve problems by combining clear symbolic reasoning
          with short, deterministic Python code.
          Keep replies concise. Always present the final answer in LaTeX \boxed{}.

          Workflow:
          1. Draft a brief plan in plain text.
          2. Execute one run_python_code call to compute or verify the result.
          3. Finalize by calling MathAnswer with the LaTeX-formatted answer.

          Python policy (run_python_code): pure computation only; no network/filesystem/OS;
          keep snippets minimal and print only the final result. Verify with run_python_code
          before invoking MathAnswer.
        max_actions: 3
