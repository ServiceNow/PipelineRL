defaults:
  - base
  - _self_

actor:
  rollout_policy: pipelinerl.domains.coding.generate_coding_rollout
  system_prompt: |-
    You are an expert Python programmer. When providing code solutions, format your final code inside markdown code blocks using triple backticks with the python language identifier, like this:
    ```python
    # your code here
    ```
    Provide complete, working implementations that pass all test cases.
  task_template: |-
    {task}
  task_prompt: ""
  ensure_boxed_answers: false

  # Use local mcp-run-python sandbox (no separate K8s job needed)
  use_local_sandbox: true
  sandbox_timeout: 5.0
  max_tests_per_problem: 15

dataset_loader: pipelinerl.domains.coding.dataset.load_problems
dataset_loader_params:
  # PrimeIntellect INTELLECT-3-RL dataset (open source, curated)
  # Available configs: code, math, logic, science
  dataset_id: PrimeIntellect/INTELLECT-3-RL
  dataset_config: code
  split: train
  subset: train  # "train" or "test" (90/10 split)
  train_ratio: 0.9
  # Difficulty filtering: keep problems with 10-90% solve rate
  min_difficulty: 0.1
  max_difficulty: 0.9
  difficulty_column: avg@8_qwen3_4b_instruct_2507
  max_examples: null
  seed: 42
  huggingface_token: ${oc.env:HF_TOKEN, null}

train_dataset_names:
  - coding

test_dataset_names:
  - coding

# No remote environment needed when use_local_sandbox=true
environment_key: coding
