defaults:
  - miniwob
  - override finetune: grpo
  - _self_

debug:
  mode: actor
save_tapes: False

model_path: ServiceNow-AI/Apriel-1.6-15b-Thinker

actor:
  rollout_policy: pipelinerl.domains.miniwob.al2_rollouts.generate_miniwob_rollout

finetune:
  seq_length: 32000  # input + output tokens
  max_train_steps: 1000  # 1000 optim steps = 1000 * bs samples
  train_batch_size: 1
  gradient_accumulation_passes: 1024
