defaults:
  - base
  - _self_

actor:
  rollout_policy: pipelinerl.domains.logic.generate_logic_rollout
  system_prompt: |-
    You are an expert at solving logic puzzles and reasoning problems. Think through each problem step by step, then provide your final answer inside <answer></answer> tags.
  task_template: |-
    {task}
  task_prompt: ""
  ensure_boxed_answers: false
  # Use local i3-logic verifier (no separate K8s job needed)
  # Set to false to use remote LogicEnvironment server
  use_local_logic_verifier: true

dataset_loader: pipelinerl.domains.logic.dataset.load_problems
dataset_loader_params:
  # PrimeIntellect INTELLECT-3-RL logic domain (11.6k samples, 87 task types)
  dataset_id: PrimeIntellect/INTELLECT-3-RL
  dataset_config: logic
  split: train
  subset: train  # "train" or "test" (90/10 split)
  train_ratio: 0.9
  # Difficulty filtering using model solve rates
  min_difficulty: 0.0
  max_difficulty: 1.0
  difficulty_column: avg@16_qwen3_4b_instruct_2507
  # Skip certain task types (as recommended by i3-logic)
  tasks_to_skip: [arc_agi, arc_agi_2, buggy_tables]
  max_examples: null
  seed: 42
  huggingface_token: ${oc.env:HF_TOKEN, null}

train_dataset_names:
  - logic

test_dataset_names:
  - logic

# Logic uses local i3-logic verifiers, no remote environment needed
environment_key: logic
