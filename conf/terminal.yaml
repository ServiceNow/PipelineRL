defaults:
  - base
  - override streams: files
  - _self_

# Qwen3.5-9B terminal-agent RL run (TMax recipe) for 4 nodes x 8 H100.
# Prerequisites (staged on the shared data mount, available in the job):
#   - proot binary at ${PROOT_BIN}
#   - per-domain base rootfs trees under ${TERMINAL_BASES_DIR}, built once with:
#       python -m pipelinerl.domains.terminal.base_builder \
#         --defs-dir <tmax>/rl_data/containers --out-dir <bases> --proot <proot>
#     A single base_software_engineering tree acts as a universal fallback.
model_path: /mnt/llmd/base_models/Qwen3.5-9B
force_restart: true
pop_old_data: true
max_lag: null
eval_every_n_versions: 0

wandb:
  use_wandb: true
  wandb_project_name: tmax_terminal
  wandb_workspace_root: /mnt/llmd/results

actor:
  rollout_policy: pipelinerl.domains.terminal.generate_terminal_rollout
  system_prompt: ""
  task_template: "{task}"
  task_prompt: ""
  ensure_boxed_answers: false
  # Concurrent rollouts per actor LLM. Each active terminal rollout owns a
  # copied rootfs, so keep this low under EAI's local ephemeral storage limit.
  # This only limits parallelism; finetune.attempts still controls group size.
  llm_max_rollouts: 2
  rollout_workers: 8
  # Problems are small; completed terminal groups can be large. Keep result
  # buffering shallow so long trajectories are allowed without preallocating
  # result_queue_size * max_group_bytes in local shared memory.
  problem_shared_memory_entry_size: 4000000
  result_shared_memory_entry_size: 1000000000
  result_queue_size: 2
  shared_memory_entry_size: 1000000000

# Rollout-side knobs (read by generate_terminal_rollout).
terminal:
  max_turns: 40              # TMax uses 64; avg rollout is ~13 turns, so 40 trims the slow tail while keeping headroom
  rollout_timeout: 1800      # hard cap per rollout, seconds (raised: long 64-turn rollouts were timing out at 1200 -> incomplete groups dropped)
  env_call_timeout: 300      # per HTTP call to the env server (/step, /finish)
  env_start_timeout: 900     # /start_task only: covers the cold per-task NFS build
  capacity_retry_sleep: 2.0  # wait instead of failing when all env slots are busy
  reward_pass: 1.0
  reward_fail: -1.0
  # Graded reward: map the pytest pass fraction onto [reward_fail, reward_pass]
  # instead of binary all-pass/all-fail. 91.8% of curriculum tasks have >1 test, so
  # partially-correct rollouts give within-group variance -> far fewer zero-advantage
  # groups filtered (gspo_32 stalled at step 11 as filtering climbed: time_waiting
  # ~13000s, 80min/batch). Counts come from proot_env._parse_pytest_counts (env-side,
  # untruncated); collection-error/0-tests -> reward_fail.
  graded_reward: true

# Remote terminal sandbox servers (one kind="environment" job per actor LLM).
environments:
  - key: terminal
    mode: remote
    replicas_per_actor: ${world.env_replicas_per_actor}
    # External CPU env-fleet: env servers run in SEPARATE --gpu 0 eai jobs
    # (terminal-envs-a/-b, launched via run_environment_fleet) so their proot/bash
    # RAM leaves the GPU nodes -> fixes the actor-node OOM (gspo_30-35 exit137/247).
    # placement=external -> WorldMap skips local placement; actors discover these
    # via account-scoped internal-dns (dns-<EAI_ACCOUNT_ID>-<name>). 2 hosts x 12
    # ports = 24 env servers. The env config below (n_envs, caps, bases_dir) is
    # shared: the fleet launcher instantiates TerminalEnvironmentServer from it.
    placement: external
    external_hosts:
      - dns-${oc.env:EAI_ACCOUNT_ID}-terminal-envs-a
      - dns-${oc.env:EAI_ACCOUNT_ID}-terminal-envs-b
    external_start_port: 7777
    external_count: 12
    _target_: pipelinerl.domains.terminal.environment_server.TerminalEnvironmentServer
    bases_dir: ${oc.env:TERMINAL_BASES_DIR,/mnt/llmd/data/terminal_bases}
    # Shared read-only task rootfs trees live on the mounted results dir (off the
    # 16GiB local ephemeral quota); proot_env scopes them by hostname. Per-session
    # writable /home/user and the lock/refcounts stay node-local.
    cache_dir: ${output_dir}/env_cache
    # Concurrent proot sessions per server. n_envs:2 (16 sessions/node) OOM-killed the
    # inference replica (exit 137, host memory: 16 concurrent bash agents on top of 8
    # vLLM engines) even though disk was fine. n_envs:1 (8 sessions/node) ran stably
    # for 75min in gspo_19. Keep 1 for memory stability; the keep-partial fix is what
    # actually unblocks the trainer. Throughput (n_envs:2 + a memory guard) is post-step
    # tuning.
    n_envs: 1
    host: "0.0.0.0"
    proot_bin: ${oc.env:PROOT_BIN,/mnt/llmd/data/terminal_bin/proot}
    nameserver: ${oc.env:TERMINAL_NAMESERVER,10.150.0.10}
    command_timeout: 60.0
    verifier_timeout: 180.0
    max_observation_chars: 4000
    check_initial_state: true
    # Hard cap on each session's node-local writable scratch. One runaway agent
    # command can otherwise fill the node's 16GiB ephemeral quota and evict the
    # replica (observed: a single session wrote 18GiB). At n_envs:2 = 16 sessions/node
    # this bounds local scratch to ~14.4GiB (<16GiB). A session over the cap is aborted
    # and scored as a normal negative outcome. Most tasks use <1MiB, so 0.9GiB is ample.
    max_session_disk_bytes: 966367641   # 0.9 GiB
    # Hard cap on each session's process-group RSS. A memory-heavy curriculum task
    # (moderate/complex are heavier than the dropped 'short') or a runaway allocation
    # OOM-killed the inference replica (gspo_28, exit 137); the disk cap only bounds
    # /tmp, not RAM. Monitor aborts the session over this (scored reward_fail). 16GiB
    # is generous (normal tasks use <1GiB); 8 sessions/node x 16 = 128GiB << node RAM.
    max_session_rss_bytes: 17179869184  # 16 GiB

environment_key: terminal

dataset_loader: pipelinerl.domains.terminal.load_problems
dataset_loader_params:
  repo_id: allenai/TMax-15K
  train_ratio: 0.95
  # First run: light, proot-friendly domains. Set null for the full 15k corpus
  # once per-domain base rootfs trees (rust/services) are built.
  tmax_domains:
    - file_operations
    - data_processing
    - debugging
  # Phase A curriculum (anti-starvation): keep only the learnable-middle buckets.
  # Drop 'short' (trivial -> all-pass -> zero-advantage filtered) and 'intricate'
  # (30-60 cmds -> all-fail within the 40-turn/no-thinking cut regime). Re-add
  # 'intricate' in Phase B once thinking + 64 turns are restored (then learnable).
  task_complexity_keep:
    - moderate
    - complex
  limit: null
  seed: 0
# The loader derives the split from the names (a name containing "test" -> held-out).
train_dataset_names:
  - tmax-15k
test_dataset_names:
  - tmax-15k-test

finetune:
  learning_rate: 1.0e-6      # TMax constant LR
  attempts: 16               # Phase A (rafa): G=16 + curriculum. keep-rate = 1 - p^G - (1-p)^G; dropping trivial 'short' moves p ~0.95->~0.7 so G16 keeps ~99% (curriculum substitutes for the paper's G=32). attempts=8 starved the trainer (~75% all-pass filtered). TMax paper uses 32; G16+curriculum is the cheaper-to-iterate equivalent.
  max_train_steps: 500       # TMax
  save_checkpoint_steps: 9999999
  also_save_steps: [100, 200, 300, 400, 500]
  save_final_training_state: false
  seq_length: 65536          # TMax
  seq_parallel: 8
  gradient_accumulation_passes: 128   # BRING-UP ONLY: 1024 -> 128. samples/step is linear in this, so time-to-first-step ~2.5h -> ~20min, landing well inside the node-eviction MTBF (the real blocker; runs were losing a 2.5h race with no resume). 1024 is the intentional staleness regime -> RESTORE for the real run.
  gradient_clipping_threshold: 0.1
  rl:
    policy_loss: gspo
    epsilon_low: 3e-3
    epsilon_high: 4e-3
    overlong_filtering: true
    filter_zero_advantage_groups: true

preprocess:
  n_workers: 8
  chunk_n_groups: 1
  input_queue_size: 2
  output_queue_size: 2
  shared_memory_entry_size: 1000000000

vllm_config:
  vllm_kwargs:
    max_model_len: 65536
    mm-processor-cache-gb: 0
    # Terminal rollouts have long, growing multi-turn contexts. The base default of
    # 1024 prefilled them in tiny chunks, so 64-turn rollouts blew the rollout
    # timeout; 8192 prefills ~8x faster. (GPU-compute bound, not disk.)
    max-num-batched-tokens: 8192
    # Route Qwen3.5 GDN prefill to the bundled Triton/FLA kernel. The default
    # ("auto") picks FlashInfer on H100, which lazily JIT-compiles gdn_prefill_sm90
    # on the first prefill and hit an in-thread FileLock reentrancy deadlock that
    # killed the EngineCore mid-generation (gspo_15).
    gdn-prefill-backend: triton

llm:
  parameters:
    max_tokens: 4096          # bring-up: thinking is off so a command fits in 4096; restore ~16000 when enabling thinking
    temperature: 1.0
  chat_template_kwargs:
    enable_thinking: false    # bring-up simplification (NOT a TMax rec; TMax uses interleaved thinking). Turn on + raise max_tokens for the real run.

test_llm:
  parameters:
    max_tokens: 16000
    temperature: 0.7
    top_p: 0.95
    top_k: 50
  chat_template_kwargs:
    enable_thinking: false

world:
  replicas: 1
  # 6/2 (was 4/4): 3 of 4 nodes generate, 1 trains. gspo_29 on 4/4 did a 3-step
  # burst off the warmup backlog then starved for step 4 (generation-bound, mirrors
  # gspo_27). 6/2 -> int(32*0.75)=24 actor GPUs (24 vLLM) + 8 finetune GPUs (one
  # seq_parallel=8 lead group). Concurrent rollout capacity is env-slot-bound
  # 16->24 (~1.5x); per-node env density unchanged (24 servers/3 nodes = 8/node).
  # Trainer fits on 8 GPUs (ZeRO-3 bf16 shards optimizer; seq_parallel shards the
  # 65536-token activations). grad_accum_per_gpu 64->128 (~2x step wall-clock, fine
  # while generation is the bottleneck). 8 trainer GPUs = 1 lead group also masks
  # the inter-lead all_gather starvation mode in Phase A.
  actor_fraction: 6
  preprocessor_fraction: 0
  finetune_fraction: 2
  # One env server per actor LLM, spread across nodes by least-busy placement.
  env_replicas_per_actor: 1
