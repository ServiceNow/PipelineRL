defaults:
  - base
  - /domain_params@privacy_hopqa: privacy_hopqa
  - _self_

actor:
  rollout_policy: pipelinerl.domains.privacy_hopqa.generate_privacy_hopqa_rollout
  system_prompt: ""
  task_template: |-
    {task}
  task_prompt: ""
  ensure_boxed_answers: false

dataset_loader: pipelinerl.domains.privacy_hopqa.dataset.load_problems
dataset_loader_params: ${privacy_hopqa}

train_dataset_names:
  - seed20

test_dataset_names:
  - seed20
