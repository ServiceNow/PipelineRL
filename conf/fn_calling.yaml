defaults:
  - base
  - _self_

actor:
  rollout_policy: pipelinerl.domains.fn_calling.generate_fn_calling_rollout
  system_prompt: |-
    You are a helpful assistant with access to functions. When the user's request requires using a function, call the appropriate function with the correct arguments. Make function calls in JSON format.
  task_template: |-
    {task}
  task_prompt: ""
  ensure_boxed_answers: false
  # Use local BFCL verifier (no separate K8s job needed)
  # Set to false to use remote BFCLEnvironment server
  use_local_bfcl_verifier: true

dataset_loader: pipelinerl.domains.fn_calling.dataset.load_problems
dataset_loader_params:
  # BFCL v3 test categories (single-turn)
  categories:
    - simple
    - multiple
    - parallel
    - parallel_multiple
  max_examples_per_category: null
  max_examples: null
  subset: train  # "train" or "test" (90/10 split by default)
  train_ratio: 0.9
  seed: 42

train_dataset_names:
  - fn_calling

test_dataset_names:
  - fn_calling

# fn_calling can use local verifier, but remote is also supported
environment_key: fn_calling
