defaults:
  - finetune: base
  - rewards: pure_success
  - streams: files
  - _self_

seed: 42

# use FP32 for lm_head computation in both training and inference.
fp32_lm_head: false
fp32_layer_prefix: "lm_head"  # "lm_head" | "output" | "embed_out" | "head"

finetune:
  seed: ${..seed}

actor:
  log_each_n_secs: 0
  llm_max_rollouts: 64
  rollout_workers: 1
  discount_factor: 1
  problem_queue_size: 64
  result_queue_size: 64
  throughput_window_size: 50
  shared_memory_entry_size: 10000000
environment: null
preprocess:
  input: actor
  output: training_data
  n_workers: 8
  chunk_n_groups: 2
  # queue for loaded raw groups
  raw_queue_size: 8
  # queue for processed chunks of multiple groups
  input_queue_size: 32
  # queue for ready chunks for multiple groups
  output_queue_size: 32
  # queue for accumulating samples before further processing
  dataset_buffer_size: 0
  # ring buffer to replace old samples with new ones when training is slow
  ring_buffer_size: 128
  # "virtual" sample queue per lead trainer
  max_ready_samples_per_lead: 512
  pop_old_data: ${..pop_old_data}
  shared_memory_entry_size: 100000000
  log_every_n_samples: 128

llm:
  parameters:
    # changed
    max_tokens: 8192
    # changed
    temperature: 1.0
test_llm:
  parameters: 
    max_tokens: 8192
    temperature: 1.0
    top_p: 0.95
    top_k: 50

vllm_config:
  use_v1: true
  quantization: null  # or bf16_last_layer_fp32
  vllm_kwargs:
    dtype: bfloat16
    gpu-memory-utilization: 0.9
    max-num-seqs: ${actor.llm_max_rollouts}
    max-num-batched-tokens: 1024
    enable-chunked-prefill: ""
    return-tokens-as-token-ids: ""
    tensor-parallel-size: 1
    pipeline-parallel-size: 1
    generation-config: vllm
    max_model_len: 10000
    # V1 specific settings
    # logprobs-mode: processed_logprobs
    # V0 specific settings
    disable-log-requests: ""
    disable-frontend-multiprocessing: ""

world:
  replicas: 1
  
  actor_fraction: 4
  preprocessor_fraction: 0
  finetune_fraction: 4

  env_replicas: 1

  actor_group_port: 9000
  environment_start_port: 7777

# this will be autocreated based on the config
jobs: []

eval_every_n_versions: 78000

model_path: Qwen/Qwen2.5-7B

# will use default based on the chosen backend
accelerate_config: null
use_deepspeed: true
deepspeed_config: deepspeed_stage3_bf16
use_fsdp: false
fsdp:
  param_dtype: fp32
  reduce_dtype: fp32
  buffer_dtype: fp32

output_dir: null
force_restart: false
pop_old_data: true
max_lag: null
attempts: ${finetune.attempts}
train_subset: null
debug:
  mode: ""
  streams_from: null
  place_inference_workers: true
  use_existing_llms: false
  log_data_pipeline: false

# Fast-LLM integration: when true, fast-llm is used as the trainer.
# Data flows actors -> Redis (fast_llm_streaming) -> fast-llm training loop.
# Weight updates are broadcast via NCCL using fast-llm's streaming callback.
use_fast_llm: true
# Whether the trainer broadcasts updated weights to vLLM after each training step.
weight_broadcast: true

# Pure fast-llm config written as-is to a YAML file at launch time.
# Fields set to null are populated by the launcher at runtime (source noted in the comment) — do not modify them here.
# This section is only used when use_fast_llm: true.
fast_llm:
  training:
    num_workers: 0
    train_iters: 100000  # Total number of optimizer steps (provided by pipelinerl)
    wandb:
      entity_name: null     # cfg.wandb.wandb_entity_name (null disables wandb)
      project_name: null    # cfg.wandb.wandb_project_name
      group_name: null      # cfg.wandb.wandb_group
    logs:
      interval: 1  # Logging frequency in optimizer steps
    checkpoint:
      interval: 1000
    export:
      interval: 1000
      format: ${fast_llm_finetune.model_format}

  schedule:
    depth_first_micro_batches: 16  # Gradient accumulation steps (sequential, one sample at a time)

  data:
    micro_batch_size: 18000  # Tokens per sample; also the max rollout length accepted
    truncate_documents: false  # Do not truncate RL rollouts
    shuffle: disabled  # Streaming dataset ignores shuffling
    datasets:
      training:
        type: streaming  # Redis-backed streaming dataset
        host: null  # cfg.streams.host
        port: null  # cfg.streams.port

  pretrained:
    format: ${fast_llm_finetune.model_format}
    path: null      # cfg.model_path
    model_weights: true

  model:
    base_model:
      head:
        losses:
          grpo:
            type: grpo
            epsilon_low: 0.2
            epsilon_high: 0.2
    multi_stage:
      zero_stage: 2
    distributed:
      compute_dtype: bf16
      tensor_parallel: 1
      pipeline_parallel: 1
      sequence_data_parallel: 1

  run:
    experiment_dir: null   # exp_dir/finetune
    experiment_name: null  # derived from exp_dir relative to cfg.wandb.wandb_workspace_root

  # callbacks section is written only when weight_broadcast: true (removed by launcher otherwise)
  callbacks:
    streaming:
      type: streaming
      host: null  # cfg.streams.host
      port: null  # cfg.streams.port
      broadcast:
        backend: nccl
        external_world_size: null  # world_map.weight_update_group_size - 1
        host: null                  # world_map.master_addr
        port: null                  # cfg.world.actor_group_port
      export:
        format: ${fast_llm_finetune.model_format}
        model_weights: true
        optimizer_state: false

# Launcher-specific fast-llm settings (not passed to fast-llm itself).
fast_llm_finetune:
  model_type: gpt      # fast-llm model type argument: fast-llm train <model_type>
  model_format: qwen2  # pretrained/export format; interpolated into fast_llm config
  torchrun_port: 29500  # master port for torchrun rendezvous

me:
  # Which job is this one? This will be autopopulated
  job_idx: null

hydra:
  run:
    dir: ${output_dir}

wandb:
  use_wandb: true
  wandb_id: null
  wandb_name: null
  # W&B entity name
  wandb_entity_name: null
  # W&B project name
  wandb_project_name: pipeline-rl
  # W&B resume policy
  wandb_resume: always
  # Whether to use only the basename or the full path as the run name
  wandb_use_basename: True
  wandb_workspace_root: results
  # set the group in your config
  wandb_group: null
  wandb_dir: null
  # Comma-separated list of keywords to tag the run.
  tags: []
